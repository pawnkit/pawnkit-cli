version: 2

project_name: pawn

builds:
  - id: pawn
    main: ./cmd/pawn
    binary: pawn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - id: pawn
    formats: [tar.gz]
    name_template: "pawn-{{ .Os }}-{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
