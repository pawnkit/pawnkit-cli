name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - if: runner.os == 'Linux'
        name: Check formatting and module files
        run: |
          test -z "$(gofmt -l .)"
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - if: runner.os == 'Linux'
        run: CGO_ENABLED=1 go test -race -shuffle=on ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.11.4

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - run: go tool govulncheck ./...

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: v2.12.7
          args: release --snapshot --clean
      - name: Check release archives
        shell: bash
        run: |
          for archive in \
            pawn-linux-amd64.tar.gz \
            pawn-linux-arm64.tar.gz \
            pawn-darwin-amd64.tar.gz \
            pawn-darwin-arm64.tar.gz; do
            test -f "dist/$archive"
            test "$(tar -tzf "dist/$archive")" = pawn
          done
          test -f dist/pawn-windows-amd64.tar.gz
          test "$(tar -tzf dist/pawn-windows-amd64.tar.gz)" = pawn.exe
          mkdir smoke
          tar -xzf dist/pawn-linux-amd64.tar.gz -C smoke
          smoke/pawn version | grep -Eq '^pawn .+$'
          ! smoke/pawn version | grep -q dev
          test -f dist/checksums.txt
          (cd dist && sha256sum -c checksums.txt)
